services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: remote_support
      POSTGRES_USER: remote_support
      POSTGRES_PASSWORD: local-dev-only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:9.1.0
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:4.14.0
    command:
      - -n
      - --log-file=stdout
      - --realm=dev.remote-support.local
      - --use-auth-secret
      - --static-auth-secret=local-dev-turn-secret
      - --no-multicast-peers
      - --denied-peer-ip=10.0.0.0-10.255.255.255
      - --denied-peer-ip=172.16.0.0-172.31.255.255
      - --denied-peer-ip=192.168.0.0-192.168.255.255
      - --min-port=49160
      - --max-port=49260
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49260:49160-49260/udp"

volumes:
  pgdata:

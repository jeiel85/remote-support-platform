# Template only. Replace hostnames, certificate paths, secret injection, IPs,
# relay ranges, and limits through deployment configuration.

fingerprint
realm=turn.example.com
server-name=turn.example.com
use-auth-secret
static-auth-secret=INJECT_FROM_SECRET_MANAGER
stale-nonce=600

listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

cert=/run/secrets/turn_fullchain.pem
pkey=/run/secrets/turn_private_key.pem

no-cli
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=224.0.0.0-255.255.255.255

# Set according to measured node capacity and tenant quotas.
user-quota=0
total-quota=0
max-bps=0

no-tlsv1
no-tlsv1_1
log-file=stdout
simple-log

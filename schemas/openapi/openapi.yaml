          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    operatorBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC access token for an authenticated operator/admin.
    hostBootstrapBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Short-lived attended-host bootstrap credential.
    sessionBootstrapBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Host or operator bootstrap credential used only for peer authorization exchange.
    dpopProof:
      type: apiKey
      in: header
      name: DPoP
      description: RFC 9449 proof JWT. Required together with peer/device access tokens; htm, htu, iat, jti, ath and server
        nonce are validated and replay-cached.
    peerDpopAccessToken:
      type: http
      scheme: DPoP
      description: Short-lived session/peer/epoch/scope-bound access token containing a cnf.jkt key thumbprint. Every use
        requires a matching RFC 9449 DPoP proof.
    deviceDpopAccessToken:
      type: http
      scheme: DPoP
      description: Short-lived installed-device access token containing device/key/authorization-version claims and cnf.jkt.
        Every use requires a matching RFC 9449 DPoP proof.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: ^"[0-9]+"$
      description: Quoted state or resource version.
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 512
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WaitSeconds:
      name: waitSeconds
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 30
        default: 20
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TenantContext:
      name: X-Tenant-Id
      in: header
      required: true
      description: Explicit tenant context selected by the authenticated caller; the server verifies active membership and
        never trusts this value as authorization.
      schema:
        type: string
        format: uuid
  schemas:
    SupportCode:
      type: string
      description: Ten Crockford Base32 symbols grouped 5-5; 50 bits of server-generated entropy. Input is normalized to uppercase
        before validation.
      pattern: ^[0-9A-HJKMNP-TV-Z]{5}-[0-9A-HJKMNP-TV-Z]{5}$
      minLength: 11
      maxLength: 11
      example: 7K3M9-X2P4T
    Scope:
      type: string
      enum:
      - VIEW_SCREEN
      - CONTROL_POINTER
      - CONTROL_KEYBOARD
      - SYNC_CLIPBOARD_TEXT_HOST_TO_OPERATOR
      - SYNC_CLIPBOARD_TEXT_OPERATOR_TO_HOST
      - TRANSFER_FILE_HOST_TO_OPERATOR
      - TRANSFER_FILE_OPERATOR_TO_HOST
      - CHAT
      - SWITCH_MONITOR
      - REQUEST_REBOOT
      - RECONNECT_AFTER_REBOOT
      - UNATTENDED_SESSION
    SessionState:
      type: string
      enum:
      - CREATED
      - WAITING_FOR_OPERATOR
      - CONSENT_PENDING
      - HOST_PENDING
      - AUTHORIZED
      - NEGOTIATING
      - CONNECTED
      - RECONNECTING
      - EXPIRED
      - REJECTED
      - FAILED
      - CANCELLED
      - ENDED
    PeerRole:
      type: string
      enum:
      - HOST
      - OPERATOR
    RouteClass:
      type:
      - string
      - 'null'
      enum:
      - DIRECT
      - TURN_UDP
      - TURN_TCP
      - TURN_TLS
      - null
    PublicKeyJwk:
      oneOf:
      - type: object
        additionalProperties: false
        required:
        - kty
        - crv
        - x
        properties:
          kty:
            const: OKP
          crv:
            const: Ed25519
          x:
            type: string
            pattern: ^[A-Za-z0-9_-]{43}$
      - type: object
        additionalProperties: false
        required:
        - kty
        - crv
        - x
        - y
        properties:
          kty:
            const: EC
          crv:
            const: P-256
          x:
            type: string
            pattern: ^[A-Za-z0-9_-]{43}$
          y:
            type: string
            pattern: ^[A-Za-z0-9_-]{43}$
      description: Endpoint signing key. Installed Windows devices SHOULD use a non-exportable P-256 CNG/TPM-backed key when
        available; ephemeral peers may use Ed25519 or P-256.
    ClientCapabilities:
      type: object
      additionalProperties: false
      required:
      - protocolMajor
      - protocolMinor
      - features
      properties:
        protocolMajor:
          type: integer
          minimum: 1
        protocolMinor:
          type: integer
          minimum: 0
        features:
          type: array
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            maxLength: 64
        codecs:
          type: array
          maxItems: 16
          uniqueItems: true
          items:
            type: string
            maxLength: 64
    CreateAttendedSessionRequest:
      type: object
      additionalProperties: false
      required:
      - hostEphemeralPublicKey
      - clientVersion
      - capabilities
      properties:
        hostEphemeralPublicKey:
          $ref: '#/components/schemas/PublicKeyJwk'
        clientVersion:
          type: string
          minLength: 1
          maxLength: 64
        installationInstanceId:
          type: string
          format: uuid
        locale:
          type: string
          maxLength: 32
        capabilities:
          $ref: '#/components/schemas/ClientCapabilities'
    AttendedSessionCreated:
      type: object
      additionalProperties: false
      required:
      - sessionId
      - supportCode
      - expiresAt
      - hostBootstrapToken
      - hostPeerId
      - state
      - stateVersion
      - pendingEventsUrl
      properties:
        sessionId:
          type: string
          format: uuid
        supportCode:
          $ref: '#/components/schemas/SupportCode'
        expiresAt:
          type: string
          format: date-time
        hostBootstrapToken:
          type: string
          minLength: 32
        hostPeerId:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/SessionState'
        stateVersion:
          type: integer
          minimum: 1
        pendingEventsUrl:
          type: string
          format: uri
    ResolveAttendedSessionRequest:
      type: object
      additionalProperties: false
      required:
      - supportCode
      - requestedScopes
      - operatorEphemeralPublicKey
      - clientVersion
      properties:
        supportCode:
          $ref: '#/components/schemas/SupportCode'
        requestedScopes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Scope'
        operatorEphemeralPublicKey:
          $ref: '#/components/schemas/PublicKeyJwk'
        clientVersion:
          type: string
          minLength: 1
          maxLength: 64
        capabilities:
          $ref: '#/components/schemas/ClientCapabilities'
    ConsentRequest:
      type: object
      additionalProperties: false
      required:
      - sessionId
      - consentRequestId
      - operator
      - requestedScopes
      - expiresAt
      - stateVersion
      - operatorBootstrapToken
      properties:
        sessionId:
          type: string
          format: uuid
        consentRequestId:
          type: string
          format: uuid
        operator:
          type: object
          additionalProperties: false
          required:
          - displayName
          - tenantDisplayName
          properties:
            displayName:
              type: string
              minLength: 1
              maxLength: 200
            tenantDisplayName:
              type: string
              minLength: 1
              maxLength: 200
            verifiedTenant:
              type: boolean
        requestedScopes:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
        expiresAt:
          type: string
          format: date-time
        stateVersion:
          type: integer
          minimum: 1
        operatorBootstrapToken:
          type: string
          minLength: 32
          description: Returned only to the authenticated operator caller.
    PendingConsent:
      type: object
      additionalProperties: false
      required:
      - sessionId
      - consentRequestId
      - operator
      - requestedScopes
      - expiresAt
      - stateVersion
      - consentNonce
      - hostEphemeralKeyThumbprint
      properties:
        sessionId:
          type: string
          format: uuid
        consentRequestId:
          type: string
          format: uuid
        operator:
          type: object
          additionalProperties: false
          required:
          - displayName
          - tenantDisplayName
          - verifiedTenant
          properties:
            displayName:
              type: string
            tenantDisplayName:
              type: string

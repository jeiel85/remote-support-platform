openapi: 3.1.0
info:
  title: Remote Support Control Plane API
  version: 1.3.0
  description: Implementation contract for attended and managed-host control-plane operations. Media, input, clipboard, chat,
    and file bytes remain peer-to-peer and are not accepted by this API.
servers:
- url: https://api.example.com/v1
  description: Production example; replace by environment configuration
tags:
- name: Attended
- name: Sessions
- name: Devices
- name: Policies
- name: Tenant
- name: Audit
- name: Updates
- name: Abuse
security:
- operatorBearer: []
paths:
  /attended-sessions:
    post:
      operationId: createAttendedSession
      summary: Create an attended host session
      tags:
      - Attended
      security: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendedSessionRequest'
      responses:
        '201':
          description: Pending attended session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendedSessionCreated'
        '400': &id001
          $ref: '#/components/responses/BadRequest'
        '429': &id002
          $ref: '#/components/responses/RateLimited'
        '500': &id003
          $ref: '#/components/responses/InternalError'
  /attended-sessions/resolve:
    post:
      operationId: resolveAttendedSession
      summary: Resolve a support code as an authenticated operator
      tags:
      - Attended
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveAttendedSessionRequest'
      responses:
        '200':
          description: Consent request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': &id004
          $ref: '#/components/responses/Unauthorized'
        '403': &id006
          $ref: '#/components/responses/Forbidden'
        '409': &id005
          $ref: '#/components/responses/Conflict'
        '429': *id002
        '500': *id003
  /attended-sessions/{sessionId}/pending-consent:
    get:
      operationId: getPendingConsent
      summary: Read the current pending consent request as the host
      tags:
      - Attended
      security:
      - hostBootstrapBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Pending consent request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingConsent'
        '204':
          description: No pending consent request
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '409': *id005
        '429': *id002
        '500': *id003
  /attended-sessions/{sessionId}/consent:
    post:
      operationId: decideAttendedConsent
      summary: Approve or reject a pending consent request
      tags:
      - Attended
      security:
      - hostBootstrapBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentDecision'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '409': *id005
        '429': *id002
        '500': *id003
  /sessions/{sessionId}:
    get:
      operationId: getSession
      summary: Read authorized session metadata
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      - operatorBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '500': *id003
    delete:
      operationId: endSession
      summary: End a session
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      - operatorBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Ended or already ended
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /sessions/{sessionId}/peer-authorization:
    post:
      operationId: exchangePeerAuthorization
      summary: Exchange a bootstrap credential and key proof for a scoped peer token
      tags:
      - Sessions
      security:
      - sessionBootstrapBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeerAuthorizationRequest'
      responses:
        '200':
          description: Peer authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeerAuthorization'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /sessions/{sessionId}/signaling-tickets:
    post:
      operationId: createSignalingTicket
      summary: Create a one-time signaling WebSocket ticket
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Signaling ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalingTicket'
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /sessions/{sessionId}/turn-credentials:
    post:
      operationId: createTurnCredentials
      summary: Issue short-lived TURN credentials for the current peer
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: TURN credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnCredentials'
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /sessions/{sessionId}/reconnect-grants:
    post:
      operationId: createReconnectGrant
      summary: Create a single-use reconnect grant and next transport epoch
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconnectRequest'
      responses:
        '200':
          description: Reconnect grant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconnectGrant'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /sessions/{sessionId}/scope-revocations:
    post:
      operationId: revokeSessionScopes
      summary: Revoke one or more granted scopes
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      - operatorBearer: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScopeRevocationRequest'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /sessions/{sessionId}/termination:
    post:
      operationId: terminateSession
      summary: Immediately terminate an authorized session as either peer
      tags:
      - Sessions
      security:
      - dpopProof: []
        peerDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionTerminationRequest'
      responses:
        '200':
          description: Terminated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400': *id001
        '401': *id004
        '403': *id006
        '404':
          $ref: '#/components/responses/NotFound'
        '409': *id005
        '429': *id002
        '500': *id003
  /device-enrollment-tokens:
    post:
      operationId: createDeviceEnrollmentToken
      summary: Create a one-time device enrollment token
      tags:
      - Devices
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentTokenRequest'
      responses:
        '201':
          description: Enrollment token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentTokenResult'
        '400': *id001
        '401': *id004
        '403': *id006
        '429': *id002
        '500': *id003
  /devices/enrollments:
    post:
      operationId: enrollDevice
      summary: Enroll an installed host and bind its device key
      tags:
      - Devices
      security: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceEnrollmentRequest'
      responses:
        '201':
          description: Device enrollment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceEnrollmentResult'
        '400': *id001
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /devices:
    get:
      operationId: listDevices
      summary: List tenant devices
      tags:
      - Devices
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDevices'
        '401': *id004
        '403': *id006
        '500': *id003
  /devices/{deviceId}:
    get:
      operationId: getDevice
      summary: Read a tenant device
      tags:
      - Devices
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '500': *id003
    delete:
      operationId: revokeDevice
      summary: Revoke a tenant device and its active credentials
      tags:
      - Devices
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Revoked or already revoked
        '404':
          $ref: '#/components/responses/NotFound'
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /devices/{deviceId}/heartbeat:
    post:
      operationId: reportDeviceHeartbeat
      summary: Report installed-host health and version
      tags:
      - Devices
      security:
      - dpopProof: []
        deviceDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeat'
      responses:
        '204':
          description: Accepted
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /devices/{deviceId}/sessions:
    post:
      operationId: createManagedSession
      summary: Request a managed attended or unattended session
      tags:
      - Devices
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagedSessionRequest'
      responses:
        '201':
          description: Managed session queued for host delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSessionCreated'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '429': *id002
        '500': *id003
  /tenant/policies:
    get:
      operationId: listPolicies
      summary: List active and draft tenant policies
      tags:
      - Policies
      responses:
        '200':
          description: Policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '401': *id004
        '403': *id006
        '500': *id003
      parameters:
      - $ref: '#/components/parameters/TenantContext'
    post:
      operationId: createPolicy
      summary: Create a draft tenant policy
      tags:
      - Policies
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyDocument'
      responses:
        '201':
          description: Policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /tenant/policies/{policyId}/versions:
    post:
      operationId: createPolicyVersion
      summary: Create an immutable policy version
      tags:
      - Policies
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/PolicyId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyDocument'
      responses:
        '201':
          description: Policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /tenant/policies/{policyId}/activate:
    post:
      operationId: activatePolicyVersion
      summary: Activate a validated policy version
      tags:
      - Policies
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/PolicyId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - version
              properties:
                version:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          $ref: '#/components/responses/NotFound'
        '400': *id001
        '401': *id004
        '403': *id006
        '409': *id005
        '500': *id003
  /tenant/audit-events:
    get:
      operationId: listAuditEvents
      summary: List authorized tenant audit events
      tags:
      - Audit
      parameters:
      - $ref: '#/components/parameters/TenantContext'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: from
        in: query
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        schema:
          type: string
          format: date-time
      - name: category
        in: query
        schema:
          type: string
          maxLength: 128
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAuditEvents'
        '400': *id001
        '401': *id004
        '403': *id006
        '500': *id003
  /updates/manifest:
    get:
      operationId: getUpdateManifest
      summary: Get signed update metadata for product/channel/architecture
      tags:
      - Updates
      security: []
      parameters:
      - name: product
        in: query
        required: true
        schema:
          type: string
          maxLength: 64
      - name: channel
        in: query
        required: true
        schema:
          type: string
          enum:
          - internal
          - canary
          - stable
      - name: architecture
        in: query
        required: true
        schema:
          type: string
          enum:
          - x64
          - arm64
      - name: currentSequence
        in: query
        required: true
        schema:
          type: integer
          minimum: 0
      responses:
        '200':
          description: Signed update metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateManifestEnvelope'
        '304':
          description: No newer eligible release
        '400': *id001
        '429': *id002
        '500': *id003
  /abuse-reports:
    post:
      operationId: createAbuseReport
      summary: Submit an abuse or unauthorized-access report
      tags:
      - Abuse
      security:
      - {}
      - hostBootstrapBearer: []
      - dpopProof: []
        peerDpopAccessToken: []
      - operatorBearer: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AbuseReportRequest'
      responses:
        '202':
          description: Report accepted
        '400': *id001
        '429': *id002
        '500': *id003
  /devices/{deviceId}/credential-challenges:
    post:
      operationId: createDeviceCredentialChallenge
      summary: Create a short-lived challenge for device credential refresh
      tags:
      - Devices
      security: []
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCredentialChallengeRequest'
      responses:
        '201':
          description: Challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCredentialChallenge'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /devices/{deviceId}/credentials:
    post:
      operationId: exchangeDeviceCredential
      summary: Exchange a signed device-key challenge for a short-lived device credential
      tags:
      - Devices
      security: []
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCredentialExchangeRequest'
      responses:
        '200':
          description: Device credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCredential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /devices/{deviceId}/keys/rotate:
    post:
      operationId: rotateDeviceKey
      summary: Rotate the active device key using proof from the current key
      tags:
      - Devices
      security:
      - dpopProof: []
        deviceDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceKeyRotationRequest'
      responses:
        '202':
          description: Rotation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceKeyRotationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /devices/{deviceId}/pending-session-requests:
    get:
      operationId: pollManagedSessionRequests
      summary: Long-poll managed-session requests for an installed host
      tags:
      - Devices
      security:
      - dpopProof: []
        deviceDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/DeviceId'
      - $ref: '#/components/parameters/WaitSeconds'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Pending requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedManagedSessionRequests'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /sessions/{sessionId}/managed-host-decision:
    post:
      operationId: decideManagedHostSession
      summary: Accept or reject a managed-session request and bind the host ephemeral peer key
      tags:
      - Sessions
      security:
      - dpopProof: []
        deviceDpopAccessToken: []
      parameters:
      - $ref: '#/components/parameters/SessionId'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagedHostDecision'
      responses:
        '200':
          description: Host decision applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedHostDecisionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /tenants:
    post:
      operationId: createTenant
      summary: Create a tenant and owner membership
      tags:
      - Tenant
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:

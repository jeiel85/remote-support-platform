          - JSONL
          - CSV_BUNDLE
          default: JSONL
    DataExportResult:
      type: object
      additionalProperties: false
      required:
      - requestId
      - state
      - requestedAt
      properties:
        requestId:
          type: string
          format: uuid
        state:
          type: string
          enum:
          - QUEUED
          - RUNNING
          - READY
          - FAILED
          - EXPIRED
        requestedAt:
          type: string
          format: date-time
        downloadExpiresAt:
          type:
          - string
          - 'null'
          format: date-time
        downloadUrl:
          type:
          - string
          - 'null'
          format: uri
          description: Short-lived authorized URL returned only while READY.
    TenantClosureRequest:
      type: object
      additionalProperties: false
      required:
      - confirmationPhrase
      - reason
      properties:
        confirmationPhrase:
          type: string
          minLength: 5
          maxLength: 200
        reason:
          type: string
          minLength: 1
          maxLength: 2000
    TenantClosureResult:
      type: object
      additionalProperties: false
      required:
      - requestId
      - state
      - effectiveAt
      - stateVersion
      properties:
        requestId:
          type: string
          format: uuid
        state:
          type: string
          enum:
          - PENDING_REAUTH
          - COOLING_OFF
          - SCHEDULED
          - CANCELLED
          - COMPLETED
        effectiveAt:
          type: string
          format: date-time
        stateVersion:
          type: integer
          minimum: 1
    PagedMemberships:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        nextCursor:
          type:
          - string
          - 'null'
    PagedInvitations:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Invitation'
        nextCursor:
          type:
          - string
          - 'null'
    InvitationAcceptanceRequest:
      type: object
      additionalProperties: false
      required:
      - invitationToken
      properties:
        invitationToken:
          type: string
          minLength: 32
          maxLength: 512
    UpdateRootEnvelope:
      type: object
      description: Signed update trust-root metadata. The exact JSON Schema is the source of truth.
      additionalProperties: true
    PeerAuthorizationChallenge:
      type: object
      additionalProperties: false
      required:
      - challengeId
      - sessionId
      - peerId
      - role
      - nonce
      - keyThumbprint
      - transportEpoch
      - expiresAt
      - canonicalizationVersion
      properties:
        challengeId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        peerId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/PeerRole'
        nonce:
          type: string
          minLength: 16
          maxLength: 256
        keyThumbprint:
          type: string
          pattern: ^[A-Za-z0-9_-]{43}$
          description: RFC 7638 SHA-256 JWK thumbprint in unpadded base64url.
        transportEpoch:
          type: integer
          minimum: 0
        expiresAt:
          type: string
          format: date-time
        canonicalizationVersion:
          const: RSP-PEER-AUTH-V1
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Authorization or policy denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: State or version conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Rate or abuse limit reached
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalError:
      description: Unexpected server failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'

groups:
  - name: remote-support-availability
    interval: 30s
    rules:
      - alert: ControlApiFastBurn
        expr: sum(rate(rsp_control_api_failures_total[5m])) / clamp_min(sum(rate(rsp_control_api_requests_total[5m])), 0.01) > 0.0144
        for: 5m
        labels: { severity: sev2, owner: control-plane }
        annotations: { runbook: 08-operations/runbooks/control-plane-outage.md }
      - alert: ControlApiSlowBurn
        expr: sum(rate(rsp_control_api_failures_total[6h])) / clamp_min(sum(rate(rsp_control_api_requests_total[6h])), 0.01) > 0.006
        for: 30m
        labels: { severity: sev3, owner: control-plane }
        annotations: { runbook: 08-operations/runbooks/control-plane-outage.md }
      - alert: SessionAuthorizationFailure
        expr: sum(rate(rsp_session_authorization_total{outcome="failure"}[10m])) > 0.05 and sum(increase(rsp_session_authorization_total[10m])) >= 20
        for: 10m
        labels: { severity: sev2, owner: control-plane }
        annotations: { runbook: 08-operations/runbooks/control-plane-outage.md }
      - alert: SignalingConnectFailure
        expr: sum by (region) (rate(rsp_signaling_connect_total{outcome="failure"}[10m])) / clamp_min(sum by (region) (rate(rsp_signaling_connect_total[10m])), 0.01) > 0.05
        for: 10m
        labels: { severity: sev2, owner: control-plane }
        annotations: { runbook: 08-operations/runbooks/control-plane-outage.md }
      - alert: TurnAllocationFailure
        expr: sum by (region) (rate(turn_allocation_total{outcome="failure"}[5m])) / clamp_min(sum by (region) (rate(turn_allocation_total[5m])), 0.01) > 0.03
        for: 5m
        labels: { severity: sev2, owner: relay }
        annotations: { runbook: 08-operations/runbooks/turn-capacity-or-ddos.md }
      - alert: TurnPortExhaustion
        expr: turn_relay_ports_available / clamp_min(turn_relay_ports_total, 1) < 0.20
        for: 5m
        labels: { severity: sev2, owner: relay }
        annotations: { runbook: 08-operations/runbooks/turn-capacity-or-ddos.md }
      - alert: TurnNicSaturation
        expr: turn_node_nic_utilization_ratio > 0.75 or rate(turn_node_packet_drops_total[5m]) > 0
        for: 10m
        labels: { severity: sev2, owner: relay }
        annotations: { runbook: 08-operations/runbooks/turn-capacity-or-ddos.md }
  - name: remote-support-security-and-release
    interval: 30s
    rules:
      - alert: AuditPipelineStalled
        expr: rsp_audit_backlog_oldest_seconds > 300
        for: 5m
        labels: { severity: sev2, owner: security }
        annotations: { runbook: 08-operations/runbooks/security-incident.md }
      - alert: UpdateFailureSpike
        expr: sum by (channel) (rate(rsp_update_total{outcome="failure"}[10m])) / clamp_min(sum by (channel) (rate(rsp_update_total[10m])), 0.01) > 0.02
        for: 10m
        labels: { severity: sev1, owner: client-release }
        annotations: { runbook: 08-operations/runbooks/update-rollout-incident.md }
      - alert: SigningAnomaly
        expr: increase(rsp_security_events_total{event_code=~"UPDATE_(SIGNATURE|ARTIFACT_SIGNER|ROOT)_INVALID"}[5m]) > 0
        for: 0m
        labels: { severity: sev1, owner: security }
        annotations: { runbook: 08-operations/runbooks/signing-key-compromise.md }
      - alert: CrossTenantAccessSignal
        expr: increase(rsp_security_events_total{event_code="CROSS_TENANT_ACCESS_SIGNAL"}[5m]) > 0
        for: 0m
        labels: { severity: sev1, owner: security }
        annotations: { runbook: 08-operations/runbooks/security-incident.md }

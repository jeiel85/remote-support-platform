receivers:
  otlp:
    protocols:
      grpc: {}
      http: {}
processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
  attributes/privacy:
    actions:
      - { key: authorization, action: delete }
      - { key: http.request.header.authorization, action: delete }
      - { key: enduser.email, action: delete }
      - { key: device.name, action: delete }
      - { key: session.sdp, action: delete }
      - { key: clipboard.content, action: delete }
      - { key: chat.content, action: delete }
      - { key: file.content, action: delete }
  batch:
    send_batch_size: 1024
    timeout: 5s
exporters:
  otlp/approved_backend:
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:OTEL_EXPORTER_OTLP_AUTHORIZATION}
    tls: {}
service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [otlp/approved_backend]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [otlp/approved_backend]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/privacy, batch]
      exporters: [otlp/approved_backend]
